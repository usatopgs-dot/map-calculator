name: Build TWA APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install expect and Bubblewrap
        run: |
          sudo apt-get install -y expect
          npm install -g @bubblewrap/cli

      - name: Create TWA config
        run: |
          mkdir twa-project && cd twa-project
          cat > twa-manifest.json << 'EOF'
          {
            "packageId": "com.mapcalculator.app",
            "host": "map-calculator-six.vercel.app",
            "name": "Map Distance Calculator",
            "launcherName": "MapCalc",
            "display": "standalone",
            "orientation": "portrait",
            "themeColor": "#2563eb",
            "navigationColor": "#2563eb",
            "backgroundColor": "#f9fafb",
            "startUrl": "/",
            "iconUrl": "https://map-calculator-six.vercel.app/icon-512.png",
            "maskableIconUrl": "https://map-calculator-six.vercel.app/icon-512.png",
            "appVersion": "1.0.0",
            "appVersionCode": 1,
            "signingMode": "none",
            "generatorApp": "bubblewrap-cli",
            "webManifestUrl": "https://map-calculator-six.vercel.app/manifest.json",
            "fallbackType": "customtabs",
            "features": {},
            "alphaDependencies": {
              "enabled": false
            },
            "enableNotifications": false,
            "shortcuts": [],
            "isChromeOSOnly": false,
            "isMetaQuest": false,
            "fullScopeUrl": "https://map-calculator-six.vercel.app/",
            "minSdkVersion": 19,
            "targetSdkVersion": 34
          }
          EOF

      - name: Build TWA with expect
        run: |
          cd twa-project
          expect << 'EXPECT'
          set timeout 300
          spawn bubblewrap build --skipPwaValidation
          expect "Do you want Bubblewrap to install the JDK"
          send "Y\r"
          expect "Do you want Bubblewrap to install the Android SDK"
          send "Y\r"
          expect eof
          EXPECT

      - name: List build output
        run: find twa-project -name "*.apk" -o -name "*.aab" 2>/dev/null || echo "No APK/AAB found"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: MapCalc-APK
          path: twa-project/app-release-signed.apk
          if-no-files-found: warn

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: MapCalc-AAB
          path: twa-project/app-release-bundle.aab
          if-no-files-found: warn
