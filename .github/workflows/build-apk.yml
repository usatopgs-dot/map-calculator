name: Build TWA APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android Licenses
        run: yes | sdkmanager --licenses || true

      - name: Install Android Build Tools
        run: sdkmanager "build-tools;34.0.0" "platforms;android-34" "platform-tools"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Configure bubblewrap to use system JDK and SDK
        run: |
          mkdir -p ~/.bubblewrap
          cat > ~/.bubblewrap/config.json << EOF
          {
            "jdkPath": "$JAVA_HOME",
            "androidSdkPath": "$ANDROID_HOME"
          }
          EOF
          echo "Bubblewrap config:"
          cat ~/.bubblewrap/config.json

      - name: Initialize TWA project
        run: |
          mkdir -p twa-project && cd twa-project
          bubblewrap init \
            --manifest "https://map-calculator-six.vercel.app/manifest.json" \
            --directory . \
            --skipPwaValidation 2>&1
          echo "=== Files after init ==="
          ls -la

      - name: Build APK
        run: |
          cd twa-project
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon 2>&1

      - name: Find output files
        run: |
          echo "=== APK files ==="
          find . -name "*.apk" 2>/dev/null || echo "No APK found"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: MapCalc-APK
          path: twa-project/app/build/outputs/apk/**/*.apk
          if-no-files-found: warn
