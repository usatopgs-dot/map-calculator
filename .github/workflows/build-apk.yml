name: Build TWA APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android Licenses
        run: yes | sdkmanager --licenses || true

      - name: Install Android Build Tools
        run: sdkmanager "build-tools;34.0.0" "platforms;android-34" "platform-tools"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Initialize TWA project
        run: |
          mkdir -p twa-project && cd twa-project
          bubblewrap init \
            --manifest "https://map-calculator-six.vercel.app/manifest.json" \
            --directory . \
            --skipPwaValidation 2>&1 || true

      - name: Build APK with Gradle
        run: |
          cd twa-project
          if [ -f "gradlew" ]; then
            chmod +x gradlew
            ./gradlew assembleRelease --no-daemon 2>&1
          else
            echo "gradlew not found"
            printf 'n\nn\n' | bubblewrap build --skipPwaValidation 2>&1 || true
          fi

      - name: Find all output files
        run: |
          echo "=== APK files ==="
          find . -name "*.apk" 2>/dev/null || echo "No APK"
          echo "=== AAB files ==="
          find . -name "*.aab" 2>/dev/null || echo "No AAB"
          echo "=== twa-project files ==="
          find twa-project -type f 2>/dev/null | head -30

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: MapCalc-APK
          path: |
            twa-project/**/*.apk
            twa-project/app/build/outputs/apk/**/*.apk
          if-no-files-found: warn

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: MapCalc-AAB
          path: |
            twa-project/**/*.aab
            twa-project/app/build/outputs/bundle/**/*.aab
          if-no-files-found: warn
