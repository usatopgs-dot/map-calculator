name: Build TWA APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android Licenses
        run: yes | sdkmanager --licenses || true

      - name: Install bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Create TWA project
        run: |
          mkdir twa-project && cd twa-project
          cat > twa-manifest.json << 'EOF'
          {
            "packageId": "com.mapcalculator.app",
            "host": "map-calculator-six.vercel.app",
            "name": "Map Distance Calculator",
            "launcherName": "MapCalc",
            "display": "standalone",
            "orientation": "portrait",
            "themeColor": "#2563eb",
            "navigationColor": "#2563eb",
            "backgroundColor": "#f9fafb",
            "startUrl": "/",
            "iconUrl": "https://map-calculator-six.vercel.app/icon-512.png",
            "maskableIconUrl": "https://map-calculator-six.vercel.app/icon-512.png",
            "appVersion": "1.0.0",
            "appVersionCode": 1,
            "signingMode": "none",
            "generatorApp": "bubblewrap-cli",
            "webManifestUrl": "https://map-calculator-six.vercel.app/manifest.json",
            "fallbackType": "customtabs",
            "features": {},
            "alphaDependencies": {
              "enabled": false
            },
            "enableNotifications": false,
            "shortcuts": [],
            "isChromeOSOnly": false,
            "isMetaQuest": false,
            "fullScopeUrl": "https://map-calculator-six.vercel.app/",
            "minSdkVersion": 19,
            "targetSdkVersion": 34
          }
          EOF

      - name: Build TWA
        run: |
          cd twa-project
          bubblewrap build --skipPwaValidation --yes 2>&1 || \
          (echo "y" | bubblewrap build --skipPwaValidation) 2>&1 || true

      - name: List all build files
        run: |
          echo "=== Searching for APK/AAB files ==="
          find . -name "*.apk" 2>/dev/null || echo "No APK found"
          find . -name "*.aab" 2>/dev/null || echo "No AAB found"
          find twa-project -type f 2>/dev/null | head -50

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: MapCalc-APK
          path: |
            twa-project/app-release-signed.apk
            twa-project/app-debug.apk
            twa-project/**/*.apk
          if-no-files-found: warn

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: MapCalc-AAB
          path: |
            twa-project/app-release-bundle.aab
            twa-project/**/*.aab
          if-no-files-found: warn
